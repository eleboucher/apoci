services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: apoci
      POSTGRES_PASSWORD: apoci
      POSTGRES_DB: apoci
    volumes:
      - pg-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apoci"]
      interval: 5s
      timeout: 3s
      retries: 5

  apoci:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - apoci-data:/var/lib/apoci
      - ./configs/apoci.postgres.yaml:/etc/apoci/apoci.yaml:ro

volumes:
  pg-data:
  apoci-data:
