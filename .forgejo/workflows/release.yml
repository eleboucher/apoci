---
name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  container:
    runs-on: docker
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v5

      - uses: https://data.forgejo.org/docker/setup-buildx-action@v3

      - name: Login to git.erwanleboucher.dev
        uses: https://data.forgejo.org/docker/login-action@v3
        with:
          registry: git.erwanleboucher.dev
          username: ${{ vars.USERNAME }}
          password: ${{ secrets.OWNER_PACKAGE_SECRET }}

      - name: Compute image metadata
        id: meta
        uses: https://data.forgejo.org/docker/metadata-action@v5
        with:
          images: |
            git.erwanleboucher.dev/${{ vars.USERNAME }}/apoci
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: https://data.forgejo.org/docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
