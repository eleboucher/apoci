configs:
  alice-config:
    file: ./configs/e2e-alice.yaml
  bob-config:
    file: ./configs/e2e-bob.yaml
  charlie-config:
    file: ./configs/e2e-charlie.yaml
  e2e-tests:
    file: ./tests/e2e/federation.sh

services:
  alice:
    build: .
    configs:
      - source: alice-config
        target: /etc/apoci.yaml
    command: ["serve", "-c", "/etc/apoci.yaml"]
    volumes:
      - alice-data:/apoci/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  bob:
    build: .
    configs:
      - source: bob-config
        target: /etc/apoci.yaml
    command: ["serve", "-c", "/etc/apoci.yaml"]
    volumes:
      - bob-data:/apoci/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  charlie:
    build: .
    configs:
      - source: charlie-config
        target: /etc/apoci.yaml
    command: ["serve", "-c", "/etc/apoci.yaml"]
    volumes:
      - charlie-data:/apoci/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  e2e:
    image: public.ecr.aws/docker/library/alpine:3.21
    depends_on:
      alice:
        condition: service_healthy
      bob:
        condition: service_healthy
      charlie:
        condition: service_healthy
    configs:
      - source: e2e-tests
        target: /tests/federation.sh
    entrypoint: ["sh", "-c", "apk add --no-cache curl coreutils > /dev/null 2>&1 && sh /tests/federation.sh"]

volumes:
  alice-data:
  bob-data:
  charlie-data:
