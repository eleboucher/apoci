services:
  alice:
    build: .
    volumes:
      - alice-data:/apoci/storage
      - ./configs/e2e-alice.yaml:/etc/apoci.yaml:ro
    command: ["serve", "-c", "/etc/apoci.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  bob:
    build: .
    volumes:
      - bob-data:/apoci/storage
      - ./configs/e2e-bob.yaml:/etc/apoci.yaml:ro
    command: ["serve", "-c", "/etc/apoci.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  charlie:
    build: .
    volumes:
      - charlie-data:/apoci/storage
      - ./configs/e2e-charlie.yaml:/etc/apoci.yaml:ro
    command: ["serve", "-c", "/etc/apoci.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/healthz"]
      interval: 2s
      timeout: 3s
      retries: 10

  e2e:
    image: public.ecr.aws/docker/library/alpine:3.21
    depends_on:
      alice:
        condition: service_healthy
      bob:
        condition: service_healthy
      charlie:
        condition: service_healthy
    volumes:
      - ./tests/e2e:/tests:ro
    entrypoint: ["sh", "-c", "apk add --no-cache curl coreutils > /dev/null 2>&1 && sh /tests/federation.sh"]

volumes:
  alice-data:
  bob-data:
  charlie-data:
